<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FMT Prevention Intelligence</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');

    :root {
      --bg: #f4f7f9;
      --surface: #ffffff;
      --muted-surface: #f7fafc;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --accent: #0d9488;
      --accent-strong: #0f172a;
      --pill-ok: #d1fae5;
      --pill-ok-text: #047857;
      --pill-miss: #fef3c7;
      --pill-miss-text: #b45309;
      --shadow: 0 1px 2px rgb(15 23 42 / 0.06);
      --shadow-lg: 0 12px 30px rgb(15 23 42 / 0.08);
      --radius: 14px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      color: var(--text);
      background: radial-gradient(1200px 900px at 20% 10%, #e0f2fe 0, transparent 55%), var(--bg);
    }

    .page {
      max-width: 1400px;
      margin: 0 auto;
      padding: 28px 20px 48px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    h1, h2, h3, p { margin: 0; }

    .glass {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .header {
      padding: 22px;
      display: grid;
      grid-template-columns: 1.25fr 1fr;
      gap: 22px;
      align-items: center;
    }

    .title { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; }
    .subtitle { margin-top: 6px; max-width: 680px; font-size: 15px; color: var(--muted); line-height: 1.5; }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
    }

    .metric-card {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      background: color-mix(in srgb, var(--bg) 55%, var(--surface));
      box-shadow: var(--shadow);
    }

    .metric-card .label,
    .metric-panel .label,
    .action-card .label { font-size: 12px; color: var(--muted); letter-spacing: 0.02em; text-transform: uppercase; }

    .metric-card .value,
    .metric-panel .value,
    .action-card .value {
      margin-top: 6px;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--text);
    }

    .metric-card .value { font-size: 22px; }
    .metric-panel .value { font-size: 26px; }
    .action-card .value { font-size: 28px; }

    .action-grid {
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    }

    .action-card {
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface);
      padding: 16px;
      box-shadow: var(--shadow);
    }

    .action-card .sub { margin-top: 6px; font-size: 14px; color: var(--muted); }

    .main-grid {
      display: grid;
      gap: 20px;
      grid-template-columns: minmax(340px, 1.05fr) minmax(420px, 1.2fr);
    }

    .panel { padding: 18px; }
    .panel-right { padding: 20px; }

    .section-head {
      margin-bottom: 14px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    .section-head h2 { font-size: 22px; font-weight: 700; }
    .section-sub { font-size: 14px; color: var(--muted); margin-top: 4px; }

    .controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    input[type="text"], select {
      height: 40px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface);
      padding: 0 12px;
      font-size: 14px;
      color: var(--text);
      outline: none;
      box-shadow: var(--shadow);
    }

    input[type="text"]::placeholder { color: #94a3b8; }
    input[type="text"]:focus, select:focus { border-color: color-mix(in srgb, var(--accent) 30%, var(--border)); }

    .patient-list { display: flex; flex-direction: column; gap: 10px; }

    .patient-btn {
      width: 100%;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: color-mix(in srgb, var(--bg) 60%, var(--surface));
      padding: 11px 12px;
      text-align: left;
      transition: all 0.18s ease;
      cursor: pointer;
      color: var(--text);
      box-shadow: var(--shadow);
    }

    .patient-btn:hover { border-color: color-mix(in srgb, var(--accent) 40%, var(--border)); background: var(--surface); }
    .patient-btn.active {
      border-color: var(--accent);
      background: #ecfeff;
      box-shadow: var(--shadow-lg);
    }

    .patient-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }

    .patient-name { font-size: 15px; font-weight: 700; }
    .patient-meta { margin-top: 2px; font-size: 12px; color: var(--muted); }

    .mini-stats {
      margin-top: 0;
      display: flex;
      gap: 6px;
      align-items: center;
      justify-content: flex-end;
    }

    .mini-stat {
      border-radius: 8px;
      padding: 6px 0 6px 12px;
      background: transparent;
      border: none;
      border-left: 2px solid color-mix(in srgb, var(--accent) 45%, var(--border));
    }

    .mini-stat .mini-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
    .mini-stat .mini-value { margin-top: 4px; font-weight: 700; }

    .detail-head {
      margin-bottom: 18px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .detail-kicker { font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
    .detail-name { font-size: 26px; font-weight: 700; letter-spacing: -0.02em; }
    .detail-meta { margin-top: 4px; font-size: 14px; color: var(--muted); }

    .metric-panels {
      display: none;
      margin: 0;
    }

    .metric-panel {
      border-radius: 12px;
      border: 1px solid color-mix(in srgb, var(--border) 65%, transparent);
      background: color-mix(in srgb, var(--muted-surface) 75%, var(--surface));
      padding: 14px;
      box-shadow: none;
      color: var(--muted);
      opacity: 0.92;
    }

    .metric-panel .value {
      font-size: 20px;
      font-weight: 600;
      color: color-mix(in srgb, var(--text) 55%, var(--muted));
    }

    .indicator-box {
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface);
      padding: 16px;
      box-shadow: var(--shadow);
    }

    .indicator-head {
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .indicator-head h3 { font-size: 18px; font-weight: 700; }
    .indicator-sub { font-size: 14px; color: var(--muted); margin-top: 4px; }

    .reset-btn, .update-btn {
      border: none;
      cursor: pointer;
      transition: 0.18s ease;
      font: inherit;
    }

    .reset-btn {
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface);
      padding: 9px 14px;
      font-size: 14px;
      color: var(--muted);
    }

    .reset-btn:hover { border-color: color-mix(in srgb, var(--accent) 30%, var(--border)); }

    .indicator-list { display: flex; flex-direction: column; gap: 10px; }

    .indicator-item {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: color-mix(in srgb, var(--bg) 60%, var(--surface));
      padding: 14px;
      box-shadow: var(--shadow);
    }

    .indicator-title { font-weight: 700; }
    .indicator-meta { margin-top: 4px; font-size: 13px; color: var(--muted); }

    .indicator-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .pill.ok { background: var(--pill-ok); color: var(--pill-ok-text); }
    .pill.missing { background: var(--pill-miss); color: var(--pill-miss-text); }

    .update-btn {
      border-radius: 999px;
      background: var(--accent-strong);
      color: white;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 700;
      box-shadow: var(--shadow-lg);
    }

    .update-btn:hover { opacity: 0.92; transform: translateY(-1px); }

    .insight-grid {
      margin-top: 14px;
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    }

    .insight-card {
      border-radius: 12px;
      border: 1px solid var(--border);
      background: color-mix(in srgb, var(--bg) 50%, var(--surface));
      padding: 14px;
      box-shadow: var(--shadow);
    }

    .insight-card .insight-title { font-size: 15px; font-weight: 700; }
    .insight-card .insight-text { margin-top: 6px; font-size: 14px; line-height: 1.6; color: var(--muted); }

    .empty-state {
      border-radius: 12px;
      border: 1px dashed var(--border);
      padding: 18px;
      text-align: center;
      color: var(--muted);
      background: color-mix(in srgb, var(--bg) 60%, var(--surface));
    }

    @media (max-width: 1100px) {
      .header { grid-template-columns: 1fr; }
      .main-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 720px) {
      .page { padding: 18px 14px 30px; }
      .header { padding: 18px; }
      .section-head h2 { font-size: 20px; }
      .metric-grid, .metric-panels, .action-grid, .mini-stats { grid-template-columns: 1fr; }
      .detail-name { font-size: 24px; }
      .controls { width: 100%; }
      .controls input, .controls select { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="header glass">
      <div>
        <h1 class="title">Cabinet Overview</h1>
        <p class="subtitle"></p>
      </div>
      <div class="metric-grid" id="header-metrics"></div>
    </header>

    <section class="action-grid" id="action-cards"></section>

    <div class="main-grid">
      <section class="panel glass">
        <div class="section-head">
          <div>
            <h2>Patients prioritaires</h2>
            <p class="section-sub">Classés par gain potentiel FMT</p>
          </div>
          <div class="controls">
            <input id="searchInput" type="text" placeholder="Rechercher" />
            <select id="filterSelect">
              <option>Tous</option>
              <option>À rattraper</option>
              <option>À jour</option>
            </select>
            <select id="categorySelect">
              <option>Toutes</option>
              <option>Vaccination</option>
              <option>Dépistage</option>
              <option>Suivi</option>
            </select>
          </div>
        </div>
        <div class="patient-list" id="patientList"></div>
      </section>

      <section class="panel panel-right glass">
        <div class="detail-head">
          <div>
            <div class="detail-kicker">Détail patient</div>
            <h2 class="detail-name" id="detailName"></h2>
            <div class="detail-meta" id="detailMeta"></div>
          </div>
        </div>

        <div class="metric-panels" id="detailMetrics"></div>

        <div class="indicator-box">
          <div class="indicator-head">
            <div>
              <h3>Indicateurs prévention</h3>
              <p class="indicator-sub">Clique sur “Mettre à jour” pour simuler une action cabinet.</p>
            </div>
            <button class="reset-btn" id="resetBtn">Réinitialiser</button>
          </div>

          <div class="indicator-list" id="indicatorList"></div>
        </div>

        <div class="insight-grid" id="insights"></div>
        
      </section>
    </div>
  </div>

  <script>
    const patients = [
      {
        id: "PAT-001",
        name: "Yvette Bonneau",
        age: 72,
        risk: "Élevé",
        socle: 55,
        current: 60,
        potential: 70,
        gap: 10,
        status: [
          { label: "Vaccin grippe", ok: false, gain: 5 },
          { label: "Mammographie", ok: true, gain: 0 },
          { label: "Dépistage colorectal", ok: false, gain: 5 },
        ],
        action: "Programmer vaccin + FIT",
      },
      {
        id: "PAT-002",
        name: "Jean-Paul Girard",
        age: 58,
        risk: "Modéré",
        socle: 55,
        current: 70,
        potential: 70,
        gap: 5,
        status: [
          { label: "HbA1c", ok: true, gain: 0 },
          { label: "Fond d'œil", ok: true, gain: 0 },
          { label: "Vaccin grippe", ok: true, gain: 0 },
        ],
        action: "Aucune action prioritaire",
      },
      {
        id: "PAT-003",
        name: "Véronique Aumont",
        age: 52,
        risk: "Élevé",
        socle: 5,
        current: 5,
        potential: 10,
        gap: 5,
        status: [
          { label: "Mammographie", ok: false, gain: 5 },
          { label: "Vaccin grippe", ok: true, gain: 0 },
        ],
        action: "Relancer mammographie",
      },
      {
        id: "PAT-004",
        name: "Roger Blanchard",
        age: 68,
        risk: "Critique",
        socle: 55,
        current: 60,
        potential: 70,
        gap: 10,
        status: [
          { label: "Vaccin grippe", ok: false, gain: 5 },
          { label: "Fond d'œil", ok: false, gain: 5 },
          { label: "HbA1c", ok: true, gain: 0 },
        ],
        action: "Vaccin + ophtalmo",
      },
    ];

    const insights = [
      {
        title: "Pourquoi ce patient remonte",
        text: "Le gain est calculé sur les indicateurs prévention manquants. Chaque rattrapage validé augmente immédiatement le FMT simulé.",
      },
      {
        title: "Comment le tester en démo",
        text: "Choisis un patient, corrige un vaccin ou un dépistage, puis observe la mise à jour instantanée du gain restant.",
      },
      {
        title: "Plan d’action rapide",
        text: "Filtre Vaccination, Dépistage ou Suivi pour obtenir une liste ciblée de rappels et lancer les actions du jour.",
      },
    ];

    const state = {
      selectedId: [...patients].sort((a, b) => b.gap - a.gap)[0].id,
      search: "",
      filter: "Tous",
      category: "Toutes",
      simulatedFixes: {},
    };

    const els = {
      headerMetrics: document.getElementById('header-metrics'),
      actionCards: document.getElementById('action-cards'),
      patientList: document.getElementById('patientList'),
      detailName: document.getElementById('detailName'),
      detailMeta: document.getElementById('detailMeta'),
      detailMetrics: document.getElementById('detailMetrics'),
      indicatorList: document.getElementById('indicatorList'),
      insights: document.getElementById('insights'),
      searchInput: document.getElementById('searchInput'),
      filterSelect: document.getElementById('filterSelect'),
      categorySelect: document.getElementById('categorySelect'),
      resetBtn: document.getElementById('resetBtn'),
    };

    function computeCategoryCounts() {
      return {
        Vaccination: patients.reduce((sum, p) => sum + p.status.filter((s) => !s.ok && s.label.toLowerCase().includes('vaccin')).length, 0),
        Dépistage: patients.reduce((sum, p) => sum + p.status.filter((s) => !s.ok && (s.label.toLowerCase().includes('mamm') || s.label.toLowerCase().includes('colorectal'))).length, 0),
        Suivi: patients.reduce((sum, p) => sum + p.status.filter((s) => !s.ok && (s.label.toLowerCase().includes('hba1c') || s.label.toLowerCase().includes('fond'))).length, 0),
      };
    }

    function getCategorySeries() {
      const counts = computeCategoryCounts();
      return [
        { label: 'Vaccination', value: counts.Vaccination },
        { label: 'Dépistage', value: counts.Dépistage },
        { label: 'Suivi', value: counts.Suivi },
      ];
    }

    function getDisplayedPatients() {
      const topPatients = [...patients].sort((a, b) => b.gap - a.gap);
      return topPatients.filter((p) => {
        const matchesSearch = p.name.toLowerCase().includes(state.search.toLowerCase());
        const matchesFilter =
          state.filter === 'Tous' ||
          (state.filter === 'À jour' && p.gap === 0) ||
          (state.filter === 'À rattraper' && p.gap > 0);

        const matchesCategory =
          state.category === 'Toutes' ||
          p.status.some((s) => {
            const label = s.label.toLowerCase();
            if (state.category === 'Vaccination') return label.includes('vaccin');
            if (state.category === 'Dépistage') return label.includes('mamm') || label.includes('colorectal');
            if (state.category === 'Suivi') return label.includes('hba1c') || label.includes('fond');
            return true;
          });

        return matchesSearch && matchesFilter && matchesCategory;
      });
    }

    function getSelectedPatient() {
      return patients.find((p) => p.id === state.selectedId) || patients[0];
    }

    function getResolvedStatus(selected) {
      return selected.status.map((item) => {
        const key = `${selected.id}-${item.label}`;
        return state.simulatedFixes[key] ? { ...item, ok: true, gain: 0 } : item;
      });
    }

    function getResolvedCurrent(selected) {
      return selected.current + selected.status
        .filter((item) => {
          const key = `${selected.id}-${item.label}`;
          return !item.ok && state.simulatedFixes[key];
        })
        .reduce((sum, item) => sum + item.gain, 0);
    }

    function renderHeaderMetrics() {
      const totalCurrent = patients.reduce((sum, p) => sum + p.current, 0);
      const totalPotential = patients.reduce((sum, p) => sum + p.potential, 0);
      const totalGap = totalPotential - totalCurrent;

      const metrics = [
        { label: 'Patients', value: String(patients.length) },
        { label: 'FMT potentiel', value: `${totalPotential} €` },
        { label: 'FMT (+)', value: `+${totalGap} €` },
      ];

      els.headerMetrics.innerHTML = metrics.map((item) => `
        <div class="metric-card">
          <div class="label">${item.label}</div>
          <div class="value">${item.value}</div>
        </div>
      `).join('');
    }

    function renderActionCards() {
      const totalCurrent = patients.reduce((sum, p) => sum + p.current, 0);
      const totalPotential = patients.reduce((sum, p) => sum + p.potential, 0);
      const totalGap = totalPotential - totalCurrent;
      const actionableCount = patients.filter((p) => p.gap > 0).length;
      const topCategory = [...getCategorySeries()].sort((a, b) => b.value - a.value)[0];

      const cards = [
        {
          title: 'Patients à rattraper',
          value: String(actionableCount),
          subtitle: `${totalGap} € récupérables`,
        },
        {
          title: 'Levier prioritaire',
          value: topCategory.label,
          subtitle: `${topCategory.value} actions à rattraper`,
        },
      ];


    }

    function renderPatientList() {
      const displayedPatients = getDisplayedPatients();

      if (!displayedPatients.length) {
        els.patientList.innerHTML = '<div class="empty-state">Aucun patient ne correspond aux filtres.</div>';
        return;
      }

      if (!displayedPatients.some((p) => p.id === state.selectedId)) {
        state.selectedId = displayedPatients[0].id;
      }

      els.patientList.innerHTML = displayedPatients.map((p) => `
        <button class="patient-btn ${state.selectedId === p.id ? 'active' : ''}" data-id="${p.id}">
          <div class="patient-top">
            <div>
              <div class="patient-name">${p.name}</div>
              <div class="patient-meta">${p.id} · ${p.age} ans</div>
            </div>
            <div class="mini-stats">
              <div class="mini-stat">
                <div class="mini-label">FMT (+)</div>
                <div class="mini-value">+${p.gap} €</div>
              </div>
            </div>
          </div>
        </button>
      `).join('');

      els.patientList.querySelectorAll('.patient-btn').forEach((btn) => {
        btn.addEventListener('click', () => {
          state.selectedId = btn.dataset.id;
          render();
        });
      });
    }

    function renderDetail() {
      const selected = getSelectedPatient();
      const resolvedStatus = getResolvedStatus(selected);
      const resolvedCurrent = getResolvedCurrent(selected);
      const resolvedGap = Math.max(0, selected.potential - resolvedCurrent);

      els.detailName.textContent = selected.name;
      els.detailMeta.textContent = `${selected.id} · ${selected.age} ans · action recommandée : ${selected.action}`;

      const metrics = [
        { label: 'Socle', value: `${selected.socle} €` },
        { label: 'FMT actuel', value: `${resolvedCurrent} €` },
        { label: 'Gain restant', value: `+${resolvedGap} €` },
      ];

      els.detailMetrics.innerHTML = metrics.map((item) => `
        <div class="metric-panel">
          <div class="label">${item.label}</div>
          <div class="value">${item.value}</div>
        </div>
      `).join('');

      els.indicatorList.innerHTML = resolvedStatus.map((item) => {
        const key = `${selected.id}-${item.label}`;
        const initiallyMissing = selected.status.find((s) => s.label === item.label && !s.ok);
        const meta = item.ok ? 'À jour' : `Non à jour · gain potentiel +${item.gain} €`;

        return `
          <div class="indicator-item">
            <div>
              <div class="indicator-title">${item.label}</div>
              <div class="indicator-meta">${meta}</div>
            </div>
            <div class="indicator-actions">
              <span class="pill ${item.ok ? 'ok' : 'missing'}">${item.ok ? 'Validé' : 'Manquant'}</span>
              ${initiallyMissing && !state.simulatedFixes[key] ? `<button class="update-btn" data-key="${key}">Mettre à jour</button>` : ''}
            </div>
          </div>
        `;
      }).join('');

      els.indicatorList.querySelectorAll('.update-btn').forEach((btn) => {
        btn.addEventListener('click', () => {
          const key = btn.dataset.key;
          state.simulatedFixes[key] = true;
          renderDetail();
        });
      });
    }

    function renderInsights() {
      els.insights.innerHTML = insights.map((item) => `
        <div class="insight-card">
          <div class="insight-title">${item.title}</div>
          <div class="insight-text">${item.text}</div>
        </div>
      `).join('');
    }

    function render() {
      renderHeaderMetrics();
      renderActionCards();
      renderPatientList();
      renderDetail();
    }

    els.searchInput.addEventListener('input', (e) => {
      state.search = e.target.value;
      render();
    });

    els.filterSelect.addEventListener('change', (e) => {
      state.filter = e.target.value;
      render();
    });

    els.categorySelect.addEventListener('change', (e) => {
      state.category = e.target.value;
      render();
    });

    els.resetBtn.addEventListener('click', () => {
      state.simulatedFixes = {};
      renderDetail();
    });

    render();
  </script>
</body>
</html>
